<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1 class="generator">Password generator</h1>
      <div class="generated">
        <input
          type="text"
          id="generated-password"
          name="generated-password"
          class="generated-password"
        />
        <p class="copy" id="copy">copy</p>
      </div>
      <div class="boxcheck-container">
        <div class="boxcheck">
          <p class="length">Password Length:</p>
          <input
            type="number"
            id="password-length"
            name="password-length"
            class="password-length"
          />
        </div>
        <div class="boxcheck">
          <p>Contain Lowercase Letters:</p>
          <input type="checkbox" name="contain lowercase" class="contain" />
        </div>
        <div class="boxcheck">
          <p>Contain Uppercase Letters:</p>
          <input type="checkbox" name="contain uppercase" class="contain" />
        </div>
        <div class="boxcheck">
          <p>Contain Numbers:</p>
          <input type="checkbox" name="contain number" class="contain" />
        </div>
        <div class="boxcheck">
          <p>Contain Symbols:</p>
          <input type="checkbox" name="contain symbols" class="contain" />
        </div>
      </div>
      <button type="button" id="generate-password" class="generate-password">
        Generate Password
      </button>
    </main>
    <script src="script.js"></script>
  </body>
</html>
